name: Release On Manifest Version

on:
  push:
    branches:
      - main
    paths:
      - custom_components/ha_wecom/manifest.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version change
        id: version
        shell: bash
        run: |
          set -euo pipefail
          MANIFEST="custom_components/ha_wecom/manifest.json"

          NEW_VERSION=$(python -c "import json;print(json.load(open('${MANIFEST}', encoding='utf-8'))['version'])")

          BEFORE_SHA="${{ github.event.before }}"
          OLD_VERSION=""

          if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${BEFORE_SHA}:${MANIFEST}" 2>/dev/null; then
              OLD_VERSION=$(git show "${BEFORE_SHA}:${MANIFEST}" | python -c "import json,sys;print(json.load(sys.stdin).get('version',''))")
            fi
          fi

          if [ "${OLD_VERSION}" = "${NEW_VERSION}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "v${NEW_VERSION}" >/dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
